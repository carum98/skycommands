name: Deploy Backend

on:
  push:
    paths:
      - 'packages/backend/**'
  pull_request:
    paths:
      - 'packages/backend/**'

env:
  IMAGE_NAME: skycommands-backend
  IMAGE_REF: ghcr.io/${{ github.actor }}/skycommands-backend:${{ github.ref_name }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    environment: Production
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        sparse-checkout: packages/backend
        sparse-checkout-cone-mode: false
    
    - name: Docker Login
      uses: docker/login-action@v3.0.0
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.TOKEN_DEPLOY }}
        logout: true
    
    - name: Build the Docker image
      run: cd packages/backend && docker build . --tag ${{ env.IMAGE_REF }}

    - name: Send to registry
      run: docker push ${{ env.IMAGE_REF }}

  deploy:
    runs-on: ubuntu-latest
    environment: Production
    needs: build-and-push
    
    steps:
    - name: Pull and start the container
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SSH_HOST }}
        port: ${{ secrets.SSH_PORT }}
        username: ${{ secrets.SSH_USERNAME }}
        password: ${{ secrets.SSH_PASSWORD }}
        script: |
          mkdir -p ~/skycommands/backend &&
          cd ~/skycommands/backend &&
          docker login ghcr.io -u ${{ github.actor }} -p ${{ secrets.TOKEN_DEPLOY }} &&
          docker pull ${{ env.IMAGE_REF }} &&
          docker rm -f ${{ env.IMAGE_NAME }} || true &&
          docker run -d --restart unless-stopped \
            --name ${{ env.IMAGE_NAME }} \
            -p ${{ vars.PORT_BACKEND }}:3000 \
            -e AUTH_USERNAME='${{ secrets.AUTH_USERNAME }}' \
            -e AUTH_PASSWORD='${{ secrets.AUTH_PASSWORD }}' \
            -e APP_KEY='${{ secrets.APP_KEY }}' \
            -v $(pwd)/database.db:/app/database.db \
            -v $(pwd)/serviceAccountKey.json:/app/serviceAccountKey.json \
            -v $(pwd)/logs:/app/logs \
            ${{ env.IMAGE_REF }}